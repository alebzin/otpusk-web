                                this.classList.add('active');
                                openDetail(currentDetailId);
                            }
                        });
                    });

                    detailContent.querySelectorAll('.plug-tag').forEach(el => {
                        el.addEventListener('click', function(e) {
                            e.stopPropagation();
                            const plugCode = this.dataset.plug;
                            if (plugCode) {
                                openPlugModal(plugCode);
                            }
                        });
                    });
                }

                // Сброс скролла только при первом открытии, а не при обновлении (например, смена дней)
                const wasActive = overlay.classList.contains('active');
                if (!wasActive) {
                    // Устанавливаем фон overlay сразу, чтобы избежать белого мига
                    const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--overlay').trim();
                    overlay.style.background = bgColor || 'rgba(8,32,38,0.45)';
                    overlay.style.backdropFilter = 'blur(10px)';
                    overlay.style.webkitBackdropFilter = 'blur(10px)';
                }

                updateDetailButtons();
                if (overlay) {
                    overlay.classList.add('active');
                    document.body.style.overflow = 'hidden';
                }

                // Сброс прокрутки только если overlay не был активен (первое открытие)
                if (!wasActive) {
                    const card = document.getElementById('detailCard');
                    if (card) card.scrollTop = 0;
                }

                // ===== ДОБАВЛЯЕМ ОБРАБОТЧИКИ СВАЙПА ДЛЯ МОБИЛЬНОЙ ВЕРСИИ =====
                if (window.innerWidth < 768) {
                    detailCard.removeEventListener('touchstart', handleTouchStart);
                    detailCard.removeEventListener('touchmove', handleTouchMove);
                    detailCard.removeEventListener('touchend', handleTouchEnd);
                    detailCard.addEventListener('touchstart', handleTouchStart, { passive: true });
                    detailCard.addEventListener('touchmove', handleTouchMove, { passive: true });
                    detailCard.addEventListener('touchend', handleTouchEnd, { passive: true });
                }
            }

            // ===== ПЕРЕМЕННЫЕ ДЛЯ СВАЙПА =====
            let touchStartY = 0;
            let touchDeltaY = 0;
            let isSwiping = false;

            function handleTouchStart(e) {
                const touch = e.touches[0];
                touchStartY = touch.clientY;
                touchDeltaY = 0;
                isSwiping = false;
            }

            function handleTouchMove(e) {
                if (touchStartY === 0) return;
                const touch = e.touches[0];
                const currentY = touch.clientY;
                touchDeltaY = currentY - touchStartY;
                if (Math.abs(touchDeltaY) > 10) {
                    isSwiping = true;
                }
            }

            function handleTouchEnd(e) {
                if (!isSwiping) return;
                const scrollEl = detailCard;
                const scrollTop = scrollEl.scrollTop;
                const scrollHeight = scrollEl.scrollHeight;
                const clientHeight = scrollEl.clientHeight;

                // Увеличиваем порог с 80 до 160
                if (touchDeltaY > 160 && scrollTop === 0) {
                    closeDetail();
                    return;
                }
                if (touchDeltaY < -160 && scrollTop + clientHeight >= scrollHeight - 2) {
                    closeDetail();
                    return;
                }
            }

            function closeDetail() {
                if (overlay) overlay.classList.remove('active');
                document.body.style.overflow = '';
                currentDetailId = null;
                if (detailCard) {
                    detailCard.removeEventListener('touchstart', handleTouchStart);
                    detailCard.removeEventListener('touchmove', handleTouchMove);
                    detailCard.removeEventListener('touchend', handleTouchEnd);
                }
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (overlay && overlay.classList.contains('active')) closeDetail();
                    if (compareOverlay && compareOverlay.classList.contains('active')) closeCompare();
                    if (plugModalOverlay && plugModalOverlay.classList.contains('active')) closePlugModal();
                }
            });

            // ===== КНОПКИ =====
            if (addCompareBtn) {
                addCompareBtn.addEventListener('click', () => { if (!currentDetailId) return;
                    toggleCompare(currentDetailId); });
            }
            if (compareFromDetailBtn) {
                compareFromDetailBtn.addEventListener('click', () => { if (compareList.length >= 2) { openCompare(); } });
            }

            // ===== КНОПКА ОЧИСТКИ ПОИСКА =====
            function updateClearButton() {
                if (searchInput.value.length > 0) {
                    searchClearBtn.classList.add('visible');
                } else {
                    searchClearBtn.classList.remove('visible');
                }
            }

            searchInput.addEventListener('input', updateClearButton);
            searchClearBtn.addEventListener('click', () => {
                searchInput.value = '';
                searchClearBtn.classList.remove('visible');
                searchInput.focus();
                onFilterChange();
            });

            // ===== СОБЫТИЯ =====
            function onFilterChange() {
                if (renderTimeout) clearTimeout(renderTimeout);
                renderTimeout = setTimeout(() => render(parseInt(monthSelect.value)), 150);
            }

            if (searchInput) {
                searchInput.addEventListener('input', onFilterChange);
            }

            if (monthSelect) {
                monthSelect.addEventListener('change', (e) => {
                    render(parseInt(e.target.value));
                });
            }

            if (compareBtn) {
                compareBtn.addEventListener('click', openCompare);
            }

            if (clearCompareBtn) {
                clearCompareBtn.addEventListener('click', () => {
                    compareList = [];
                    updateCompareUI();
                    updateDetailButtons();
                    render(parseInt(monthSelect.value));
                });
            }

            if (compareClose) {
                compareClose.addEventListener('click', closeCompare);
            }

            if (compareOverlay) {
                compareOverlay.addEventListener('click', (e) => {
                    if (e.target === compareOverlay) closeCompare();
                });
            }

            if (overlay) {
                overlay.addEventListener('click', (e) => { if (e.target === overlay) closeDetail(); });
            }

            // ===== ОТКРЫТЬ СРАВНЕНИЕ =====
            function openCompare() {
                if (compareList.length < 2) return;
                if (overlay && overlay.classList.contains('active')) closeDetail();
                const items = compareList.map(id => countriesData.find(c => c.id === id)).filter(Boolean);
                if (items.length < 2) return;
                const monthIndex = parseInt(monthSelect.value);

                let html = '<div class="compare-grid">';
                items.forEach(c => {
                    const temp = c.temps[monthIndex];
                    const waterTemp = c.waterTemps[monthIndex];
                    const rainy = isRainyMonth(c.rainSeason, monthIndex);
                    const icon = getWeatherIcon(temp, c.rainSeason, monthIndex);
                    const season = c.seasons[monthIndex];
                    const comfort = getComfortForMonth(c, monthIndex);
                    const comfortLabel = getComfortLabel(comfort);
                    const comfortEmoji = getComfortEmoji(comfort);
                    const cloud = getCloudForMonth(c, monthIndex);
                    const cloudLabel = getCloudLabel(cloud);
                    const budget = calculateBudget(c, budgetDays, budgetPeople);
                    const rate = getCurrencyRate(c.currency);
                    html += `
                        <div class="compare-item">
                            <div class="ci-flag">${c.flag}</div>
                            <div class="ci-name">${c.name}</div>
                            <div class="ci-city">${c.city}</div>
                            <div class="ci-row"><span class="ci-label">Воздух</span><span class="ci-value">${temp}°C ${icon}</span></div>
                            <div class="ci-row"><span class="ci-label">Вода</span><span class="ci-value">${waterTemp}°C</span></div>
                            <div class="ci-row"><span class="ci-label">Облачность</span><span class="ci-value">${cloud}% ${cloudLabel}</span></div>
                            <div class="ci-row"><span class="ci-label">Комфорт</span><span class="ci-value">${comfortLabel}</span></div>
                            <div class="ci-row"><span class="ci-label">Дожди</span><span class="ci-value ${rainy ? 'rainy' : ''}">${c.rainSeason}</span></div>
                            <div class="ci-row"><span class="ci-label">Сезон</span><span class="ci-value"><span class="season-tag ${season}">${seasonLabels[season]}</span></span></div>
                            <div class="ci-row"><span class="ci-label">Виза</span><span class="ci-value">${c.visa}</span></div>
                            <div class="ci-row"><span class="ci-label">Валюта</span><span class="ci-value">${c.currency} (${rate} ₽)</span></div>
                            <div class="ci-row"><span class="ci-label">Бюджет (${budgetDays}дн)</span><span class="ci-value">${Math.round(budget.total).toLocaleString()} ₽</span></div>
                            <div class="ci-row"><span class="ci-label">Перелёт</span><span class="ci-value">${flightLabels[c.flightDuration] || c.flightDuration}</span></div>
                            <div class="ci-row"><span class="ci-label">Билет</span><span class="ci-value">${c.flightPrice} $</span></div>
                            <div class="ci-row"><span class="ci-label">Розетки</span><span class="ci-value">${c.plug}</span></div>
                            <div class="ci-tags">${c.typeTags.map(t => `<span class="tag">${typeLabels[t] || t}</span>`).join('')}</div>
                        </div>
                    `;
                });
                html += '</div>';
                if (compareContent) compareContent.innerHTML = html;
                if (compareOverlay) {
                    compareOverlay.classList.add('active');
                    document.body.style.overflow = 'hidden';
                }
            }

            function closeCompare() {
                if (compareOverlay) compareOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            // ===== ИНИЦИАЛИЗАЦИЯ =====
            async function init() {
                loadCachedRates();
                await fetchCurrencyRates(true);

                const currentMonth = new Date().getMonth();
                if (monthSelect) {
                    monthSelect.value = currentMonth;
                    render(currentMonth);
                }
                updateFilterSummary();

                setInterval(async () => {
                    await fetchCurrencyRates(true);
                    if (currentDetailId && overlay && overlay.classList.contains('active')) {
                        openDetail(currentDetailId);
                    }
                    render(parseInt(monthSelect.value));
                }, 300000);
            }

            init();

            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    if (currentDetailId && overlay && overlay.classList.contains('active')) {
                        openDetail(currentDetailId);
                    }
                }, 300);
            });

        })();
    </script>
</body>
</html>
